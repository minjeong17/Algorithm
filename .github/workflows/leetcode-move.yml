name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

permissions:
  contents: write

concurrency:
  group: leetcode-move-${{ github.ref }}
  cancel-in-progress: false

jobs:
  move-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Sync latest branch
        run: |
          git pull --rebase origin "${{ github.ref_name }}"

      - name: Move LeetCode solutions
        run: |
          echo "Current directory contents:"
          ls -la

          mkdir -p LeetCode
          shopt -s nullglob

          found=0

          for d in [0-9][0-9][0-9][0-9]-*/; do
            dir="${d%/}"

            echo "Moving directory: $dir"

            rm -rf "LeetCode/$dir"
            mv "$dir" "LeetCode/"

            found=1
          done

          if [ "$found" -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            git add -A
            git commit -m "chore: move LeetCode solutions to LeetCode folder"

            for i in 1 2 3; do
              git pull --rebase origin "$BRANCH_NAME"

              if git push origin "HEAD:$BRANCH_NAME"; then
                echo "Push succeeded"
                exit 0
              fi

              echo "Push failed. Retrying... ($i/3)"
              sleep 3
            done

            echo "Push failed after 3 attempts"
            exit 1
          else
            echo "No changes to commit"
          fi
