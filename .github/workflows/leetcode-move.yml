name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

permissions:
  contents: write

jobs:
  move-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move LeetCode solutions
        run: |
          echo "Current directory contents:"
          ls -la

          mkdir -p LeetCode

          shopt -s nullglob

          found=0
          for d in [0-9][0-9][0-9][0-9]-*/; do
            dir="${d%/}"
            echo "Moving directory: $dir"

            # 이미 같은 문제가 LeetCode 폴더 안에 있으면 덮어쓰기
            rm -rf "LeetCode/$dir"
            mv "$dir" "LeetCode/"

            found=1
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'

            git add -A
            git commit -m "chore: move LeetCode solutions to LeetCode folder"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
